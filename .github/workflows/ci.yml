name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install --upgrade pip
      - run: pip install pybind11 numpy scipy matplotlib scikit-rf pytest
      - run: pip install -e .
      - run: pytest tests/ -m "not slow and not plot"

  test-pynec:
    # Validate that the PyNEC web backend agrees with momwire
    # (tests/test_pynec_backend.py). PyNEC is no longer compiled here — it's
    # installed as a prebuilt wheel from the python-necpp fork's GitHub Release
    # (OpenBLAS via scipy-openblas32, OpenMP matrix-fill). That dropped the
    # autoconf/SWIG/OpenBLAS apt installs and the ~2 min C++ build. PyNEC's
    # build coverage — across the atlas/lapacke/mkl/openblas backends and on
    # Windows — now lives in python-necpp's own CI, which is its proper home;
    # this job only needs *a* working PyNEC to compare against.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install --upgrade pip
      - run: pip install pybind11 numpy scipy matplotlib scikit-rf pytest fastapi
      - run: pip install -e .
      - name: Install PyNEC from the python-necpp release wheel
        # --no-index so the ONLY candidate is the fork's wheel — never upstream
        # PyNEC on PyPI, which shares version 1.7.4 but lacks our BLAS/OpenMP
        # work and doesn't load on the target machines. numpy is already
        # installed above, so no package index is needed to satisfy deps.
        run: |
          pip install PyNEC --no-index \
            --find-links https://github.com/stevenmburns/python-necpp/releases/expanded_assets/v1.7.4-accel.1
      - run: pytest tests/test_pynec_backend.py -v
