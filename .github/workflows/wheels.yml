name: wheels

# Build redistributable wheels containing the momwire._accelerators C++ extension
# for modern Linux (manylinux_2_28, libmvec path), Windows (MSVC, /openmp:llvm +
# /arch:AVX2), and macOS Apple Silicon (arm64, Homebrew libomp + NEON
# autovectorization). cibuildwheel handles the per-Python matrix, the manylinux
# container, and wheel repair (auditwheel on Linux, delvewheel on Windows,
# delocate on macOS).
#
# Triggers (deliberately NOT pull_request — the 4-8 min cross-platform matrix
# must never block PR feedback):
#   - push to main: post-merge validation, so main always builds clean wheels
#     on both platforms. The fast Linux-compile smoke already runs per-PR in
#     ci.yml's `test` job (`pip install -e .` builds the extension), so the only
#     gap this leaves is Windows/MSVC-specific breakage, caught here on merge.
#   - push tags v*: build + attach the wheels (+ sdist) to the GitHub Release,
#     and publish them to TestPyPI via Trusted Publishing.
#   - workflow_dispatch: run the full matrix manually on a branch before merging
#     a build-affecting change, when you want cross-platform coverage pre-merge.

on:
  workflow_dispatch:
    inputs:
      pynec_find_links:
        description: >-
          --find-links URL for the pynec-accel macOS wheel to validate against.
          Use a build that ALSO excludes libomp (shares Homebrew's), otherwise
          the cross-engine job is expected to abort/deadlock.
        required: false
        default: "https://github.com/stevenmburns/python-necpp/releases/expanded_assets/v1.7.4-accel.5"
  push:
    branches: ["main"]
    tags: ["v*"]

jobs:
  build_wheels:
    name: wheels ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-14 is the native Apple Silicon (arm64) runner. Intel macOS is
        # intentionally out of scope for this first cut.
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
        # The extension builds from src/momwire only — no external sources. (The
        # PyNEC backend tests, which need a separately-installed PyNEC wheel,
        # are excluded from the wheel test-command.)
      - name: Install libomp (macOS OpenMP runtime)
        # Apple clang has no bundled OpenMP runtime; setup.py's darwin branch
        # links Homebrew's libomp (LIBOMP_PREFIX). The wheel does NOT vendor it
        # (delocate --exclude libomp) so it can share one libomp with pynec-accel
        # — so libomp is needed here at build AND by users at runtime. No-op on
        # the other runners.
        if: runner.os == 'macOS'
        run: brew install libomp
      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
      - name: Assert libomp is NOT vendored into the macOS wheel
        # Regression guard for the `delocate --exclude libomp` above: if a future
        # change drops the exclude, the wheel would bundle a private libomp again
        # and reintroduce the duplicate-OpenMP-runtime abort/deadlock when loaded
        # alongside pynec-accel. cibuildwheel's own test-command already proves
        # the wheel still LOADS against Homebrew's libomp on this runner.
        if: runner.os == 'macOS'
        run: |
          for whl in wheelhouse/*.whl; do
            if unzip -l "$whl" | grep -qi 'libomp.*\.dylib'; then
              echo "ERROR: $whl bundles libomp — the --exclude regressed."; exit 1
            fi
          done
          echo "OK: no libomp vendored in the macOS wheels."
      - name: Assert libgomp is NOT vendored into the Linux wheel
        # Regression guard for `auditwheel --exclude libgomp.so.1`: a private
        # vendored libgomp (momwire.libs/libgomp-<hash>.so) reintroduces the
        # static-TLS clash with pynec-accel (each ends up with its own OpenMP
        # runtime). cibuildwheel's test-command already proves the wheel LOADS
        # against the runner's system libgomp.
        if: runner.os == 'Linux'
        run: |
          for whl in wheelhouse/*.whl; do
            if unzip -l "$whl" | grep -qi 'libgomp'; then
              echo "ERROR: $whl bundles libgomp — the --exclude regressed."; exit 1
            fi
          done
          echo "OK: no libgomp vendored in the Linux wheels."
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  macos_cross_engine:
    # Validate the shared-libomp fix on real macOS hardware: run the PyNEC
    # cross-validation suite with momwire + PyNEC in one process and NO workaround
    # env vars (no KMP_DUPLICATE_LIB_OK, no OMP_NUM_THREADS). It passes only when
    # both extensions load a SINGLE libomp — i.e. once pynec-accel also ships the
    # `delocate --exclude libomp`. Until then it's expected to abort (OMP Error
    # #15) or deadlock, which is itself the proof the coordinated fix is needed —
    # so this is manual-only (workflow_dispatch), never on push, and time-boxed
    # so a deadlock fails fast instead of hanging. momwire is built from source
    # here, which links Homebrew's libomp directly (no vendoring), exactly like
    # the --exclude wheel does.
    name: macOS cross-engine (PyNEC + momwire, shared libomp)
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: brew install libomp
      - run: pip install --upgrade pip
      - run: pip install -e ".[test]"
      - name: Install pynec-accel (the build under test)
        # Distribution is `pynec-accel` (import name stays PyNEC); deps (numpy)
        # are already satisfied by .[test], so --no-index just pins the wheel to
        # the release under test.
        run: pip install pynec-accel --no-index --find-links "${{ inputs.pynec_find_links }}"
      - name: Assert neither extension oversubscribes a private libomp
        # No KMP_DUPLICATE_LIB_OK / OMP_NUM_THREADS here on purpose. A green run =
        # one shared libomp; an abort/timeout = two copies (fix not yet on the
        # pynec-accel side).
        run: |
          python -c "import momwire; assert momwire.accelerated, 'momwire accelerator did not load (libomp?)'"
          pytest tests/test_pynec_backend.py -v

  make_sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        run: pipx run build --sdist
      - name: Verify the sdist builds the extension from source
        # Compiling the extension from the sdist on a clean checkout is what
        # catches a missing build input (e.g. the inline header that setuptools
        # does not auto-include — see MANIFEST.in). ubuntu-latest's glibc ships
        # libmvec, so the Linux build path here matches the wheels.
        run: |
          python -m pip install --upgrade pip
          pip install dist/*.tar.gz
          python -c "import momwire._accelerators; from momwire import triangular as t; assert t._HAVE_ASSEMBLE_Z and t._HAVE_ASSEMBLE_Z_GENERAL"
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz

  release:
    name: attach wheels + sdist to release
    needs: [build_wheels, make_sdist]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Attach wheels + sdist to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz

  publish-testpypi:
    # Publish the wheels + sdist to TestPyPI via Trusted Publishing (OIDC) — no
    # stored token. Requires a matching trusted/pending publisher configured on
    # TestPyPI for project `momwire`: owner stevenmburns, repo momwire, workflow
    # wheels.yml, no environment. Without it the OIDC exchange hard-fails (it
    # does NOT skip). skip-existing makes re-runs of an already-published version
    # a no-op instead of an error. Tag-gated, same as the GitHub Release job.
    name: publish to TestPyPI
    needs: [build_wheels, make_sdist]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          skip-existing: true
