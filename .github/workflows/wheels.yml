name: wheels

# Build redistributable wheels containing the pysim._accelerators C++ extension
# for modern Linux (manylinux_2_28, libmvec path) and Windows (MSVC,
# /openmp:llvm + /arch:AVX2). cibuildwheel handles the per-Python matrix, the
# manylinux container, and wheel repair (auditwheel on Linux, delvewheel on
# Windows).
#
# Triggers:
#   - workflow_dispatch: manual validation runs while bringing the matrix green.
#   - pull_request (build-affecting paths only): catch breakage on PRs that
#     touch the extension or its build config, without running on every PR.
#   - push tags v*: build + attach the wheels to the GitHub Release.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "setup.py"
      - "pyproject.toml"
      - "src/pysim/_accelerators.cpp"
      - "src/pysim/_bspline_static_moments_inline.h"
      - ".github/workflows/wheels.yml"
  push:
    tags: ["v*"]

jobs:
  build_wheels:
    name: wheels ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        # No submodules: the extension builds from src/pysim only; the
        # python-necpp submodule is needed solely by the PyNEC backend tests,
        # which the wheel test-command deliberately excludes.
      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  release:
    name: attach wheels to release
    needs: build_wheels
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Attach wheels to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
